<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 設定主題色彩，用於瀏覽器的工具列和狀態列 -->
    <meta name="theme-color" content="#000000" />
    <!-- 在 Google 搜尋結果中，這段文字就可能會出現在網站的摘要下方 -->
    <meta name="description" content="My Pocket BookList App: 收集你想看的書，方便搜尋與分類。">
    <!-- iOS 裝置上的圖示 -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.jpg" />
    <!-- 連結到 PWA 清單檔案，讓瀏覽器知道這是一個可安裝的應用程式 -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- %PUBLIC_URL% 是 React 專案裡的一個佔位符，build 之後會替換成專案的部署路徑 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">
    <title>狗狗的書單們</title>
  </head>
  <body>
    <!-- <noscript> 是一個 HTML 標籤，用來包住在瀏覽器禁用 JavaScript 時要顯示的內容 -->
    <!-- 因為 React 完全依賴 js 渲染 -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
